name: Build Linux GStreamer Runtime

on:
  workflow_dispatch:
    inputs:
      gstreamer_version:
        description: GStreamer/Cerbero version tag to build
        required: true
        default: "1.28.2"
      release_tag:
        description: GitHub release tag to upload artifacts to
        required: true
        default: "1.28.2"

permissions:
  contents: write

env:
  CERBERO_REPO: https://gitlab.freedesktop.org/gstreamer/cerbero.git

concurrency:
  group: linux-gstreamer-${{ github.workflow }}-${{ inputs.gstreamer_version }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux-gstreamer:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
          - runner: ubuntu-22.04-arm
            arch: aarch64

    steps:
      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            build-essential \
            pkg-config \
            xz-utils \
            tar \
            file \
            patchelf \
            gh

      - name: Clone Cerbero
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${{ inputs.gstreamer_version }}" "$CERBERO_REPO" "$RUNNER_TEMP/cerbero"

      - name: Bootstrap Cerbero
        working-directory: ${{ runner.temp }}/cerbero
        run: |
          set -euo pipefail
          ./cerbero-uninstalled bootstrap

      - name: Build GStreamer package
        working-directory: ${{ runner.temp }}/cerbero
        run: |
          set -euo pipefail
          ./cerbero-uninstalled package gstreamer-1.0

      - name: Collect Cerbero tarballs
        id: collect
        shell: bash
        env:
          VERSION: ${{ inputs.gstreamer_version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          artifact_dir="$RUNNER_TEMP/cerbero-release-artifacts"
          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"

          echo "Cerbero top-level tarballs:"
          find "$RUNNER_TEMP/cerbero" -maxdepth 1 -type f -name "*.tar.xz" -print | sort

          runtime_tar=$(find "$RUNNER_TEMP/cerbero" -maxdepth 1 -type f \
            -name "gstreamer-1.0-linux-*-${VERSION}.tar.xz" \
            ! -name "*-debug.tar.xz" \
            ! -name "*-devel.tar.xz" \
            -print -quit)

          devel_tar=$(find "$RUNNER_TEMP/cerbero" -maxdepth 1 -type f \
            -name "gstreamer-1.0-linux-*-${VERSION}-devel.tar.xz" \
            -print -quit)

          if [ -z "$runtime_tar" ]; then
            echo "Runtime tarball not found for version $VERSION"
            exit 1
          fi

          if [ -z "$devel_tar" ]; then
            echo "Development tarball not found for version $VERSION"
            exit 1
          fi

          cp "$runtime_tar" "$artifact_dir/"
          cp "$devel_tar" "$artifact_dir/"

          echo "Release artifacts:"
          ls -lh "$artifact_dir"

          echo "artifact_dir=$artifact_dir" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: cerbero-linux-${{ matrix.arch }}-${{ inputs.gstreamer_version }}
          path: ${{ steps.collect.outputs.artifact_dir }}/*.tar.xz
          if-no-files-found: error
          retention-days: 14

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes "Frame GStreamer mirror artifacts for $RELEASE_TAG"
          fi

      - name: Upload release tarballs
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ARTIFACT_DIR: ${{ steps.collect.outputs.artifact_dir }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "$ARTIFACT_DIR"/*.tar.xz --clobber
